<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Lumina - Library Catalog Management</title>
    
    <!-- Modern Typography Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

    <style>
        /* Complete Dark Mode and Glassmorphism Design Overrides */
        :root {
            --bg-gradient: radial-gradient(circle at 10% 20%, #121026 0%, #070610 100%);
            --glass-bg: rgba(26, 23, 48, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --accent-cyan: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            --accent-danger: linear-gradient(135deg, #ef4444 0%, #f43f5e 100%);
            --success-glow: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --shadow-indigo: 0 8px 32px 0 rgba(99, 102, 241, 0.15);
            --shadow-main: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
            --font-main: 'Outfit', sans-serif;
            --font-sub: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg-gradient);
            font-family: var(--font-main);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* App Wrapper */
        .app-container {
            width: 100%;
            max-width: 1400px;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* App Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--shadow-main);
            animation: fadeInDown 0.8s ease;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            font-size: 2.2rem;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseGlow 3s infinite ease-in-out;
        }

        .header-title-group h1 {
            font-family: var(--font-main);
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title-group p {
            font-family: var(--font-sub);
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 4px 0 0 0;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .header-badge {
            background: var(--accent-glow);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            font-family: var(--font-sub);
        }

        /* Double Column Grid */
        .app-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 32px;
            width: 100%;
            animation: fadeInUp 0.8s ease;
        }

        @media (max-width: 1024px) {
            .app-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-main);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            box-shadow: 0 16px 48px 0 rgba(0, 0, 0, 0.6), var(--shadow-indigo);
            border-color: rgba(99, 102, 241, 0.2);
        }

        .card-title-group {
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 16px;
        }

        .card-title-group h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title-group h2 i {
            color: #818cf8;
        }

        .card-title-group p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 6px 0 0 0;
        }

        /* Forms Styling */
        .form-field {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #cbd5e1;
            font-family: var(--font-sub);
        }

        /* Overriding PrimeFaces Input Fields */
        .ui-inputfield {
            background: rgba(255, 255, 255, 0.04) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: var(--text-primary) !important;
            font-family: var(--font-sub) !important;
            font-size: 0.9rem !important;
            border-radius: 10px !important;
            padding: 12px 16px !important;
            width: 100%;
            transition: all 0.3s ease !important;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2) !important;
        }

        .ui-inputfield.ui-state-focus, .ui-inputfield:focus {
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25) !important;
            background: rgba(255, 255, 255, 0.07) !important;
            outline: none;
        }

        .ui-inputfield::placeholder {
            color: #64748b;
        }

        /* PrimeFaces Command Buttons */
        .ui-button {
            background: var(--accent-glow) !important;
            border: none !important;
            border-radius: 10px !important;
            padding: 12px 20px !important;
            font-family: var(--font-main) !important;
            font-size: 0.95rem !important;
            font-weight: 600 !important;
            color: #ffffff !important;
            transition: all 0.3s ease !important;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.4) !important;
            cursor: pointer;
        }

        .ui-button:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 22px 0 rgba(99, 102, 241, 0.6) !important;
            filter: brightness(1.1);
        }

        .ui-button:active {
            transform: translateY(0) !important;
        }

        .ui-button .ui-button-text {
            padding: 0 !important;
        }

        .ui-button-icon-left {
            margin-right: 8px !important;
        }

        /* Custom Action Search Bar */
        .search-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
        }

        .search-input {
            flex-grow: 1;
        }

        .search-input .ui-inputfield {
            padding: 10px 14px !important;
        }

        .btn-cyan {
            background: var(--accent-cyan) !important;
            box-shadow: 0 4px 14px 0 rgba(6, 182, 212, 0.4) !important;
        }

        .btn-cyan:hover {
            box-shadow: 0 6px 22px 0 rgba(6, 182, 212, 0.6) !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #cbd5e1 !important;
            box-shadow: none !important;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15) !important;
            transform: translateY(-2px) !important;
        }

        /* PrimeFaces DataTable Custom Styling */
        .ui-datatable {
            background: transparent !important;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
        }

        .ui-datatable-header {
            background: rgba(255, 255, 255, 0.02) !important;
            border: none !important;
            color: #ffffff !important;
            padding: 16px !important;
            text-align: left;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .ui-datatable table {
            border-collapse: collapse;
        }

        .ui-datatable th {
            background: rgba(99, 102, 241, 0.1) !important;
            color: #c7d2fe !important;
            border: 1px solid rgba(255, 255, 255, 0.04) !important;
            font-family: var(--font-main) !important;
            font-weight: 600 !important;
            padding: 16px !important;
            font-size: 0.85rem !important;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .ui-datatable tbody {
            background: transparent !important;
        }

        .ui-datatable tr {
            background: rgba(255, 255, 255, 0.01) !important;
            color: #cbd5e1 !important;
            transition: all 0.25s ease !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04) !important;
        }

        .ui-datatable tr:hover {
            background: rgba(99, 102, 241, 0.06) !important;
            color: #ffffff !important;
            transform: scale(1.002);
            box-shadow: inset 4px 0 0 #6366f1;
        }

        .ui-datatable td {
            border: 1px solid rgba(255, 255, 255, 0.04) !important;
            padding: 16px !important;
            font-family: var(--font-sub) !important;
            font-size: 0.9rem !important;
        }

        .ui-datatable .ui-datatable-empty-message {
            color: var(--text-secondary) !important;
            text-align: center;
            font-style: italic;
            padding: 40px !important;
        }

        /* Table Action Buttons */
        .btn-action-delete {
            background: var(--accent-danger) !important;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3) !important;
            padding: 8px 12px !important;
            font-size: 0.8rem !important;
            border-radius: 8px !important;
        }

        .btn-action-delete:hover {
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.5) !important;
        }

        /* Paginator Custom Styles */
        .ui-paginator {
            background: rgba(255, 255, 255, 0.02) !important;
            border: none !important;
            padding: 12px !important;
            font-family: var(--font-sub) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.04) !important;
        }

        .ui-paginator .ui-paginator-page, 
        .ui-paginator .ui-paginator-next, 
        .ui-paginator .ui-paginator-last, 
        .ui-paginator .ui-paginator-first, 
        .ui-paginator .ui-paginator-prev {
            color: var(--text-secondary) !important;
            border: 1px solid transparent !important;
            background: transparent !important;
            border-radius: 8px !important;
            padding: 6px 10px !important;
            font-size: 0.85rem !important;
            transition: all 0.3s ease !important;
            margin: 0 2px !important;
            height: auto !important;
            width: auto !important;
            min-width: 32px;
        }

        .ui-paginator .ui-paginator-page:hover, 
        .ui-paginator .ui-paginator-next:hover, 
        .ui-paginator .ui-paginator-last:hover, 
        .ui-paginator .ui-paginator-first:hover, 
        .ui-paginator .ui-paginator-prev:hover {
            background: rgba(255, 255, 255, 0.05) !important;
            color: #ffffff !important;
        }

        .ui-paginator .ui-paginator-page.ui-state-active {
            background: var(--accent-glow) !important;
            color: #ffffff !important;
            font-weight: 700 !important;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3) !important;
        }

        /* PrimeFaces Growl Styling */
        .ui-growl {
            top: 40px !important;
            right: 40px !important;
        }

        .ui-growl-item-container {
            background: rgba(23, 20, 44, 0.9) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: var(--shadow-main) !important;
            border-radius: 12px !important;
            color: #ffffff !important;
        }

        .ui-growl-title {
            font-family: var(--font-main) !important;
            font-weight: 600 !important;
            font-size: 0.95rem !important;
        }

        .ui-growl-message p {
            font-family: var(--font-sub) !important;
            font-size: 0.85rem !important;
            color: #e2e8f0 !important;
        }

        .ui-growl-image {
            display: inline-block;
        }

        .ui-growl-image.ui-growl-image-info {
            background: var(--success-glow);
            border-radius: 50%;
            padding: 4px;
        }

        .ui-growl-image.ui-growl-image-error {
            background: var(--accent-danger);
            border-radius: 50%;
            padding: 4px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            0%, 100% {
                filter: drop-shadow(0 0 2px rgba(99, 102, 241, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.8));
            }
        }
    </style>
</h:head>

<h:body>
    <div class="app-container">
        
        <!-- App Header Component -->
        <header class="app-header">
            <div class="header-left">
                <i class="pi pi-server logo-icon"></i>
                <div class="header-title-group">
                    <h1>Lumina Catalog Console</h1>
                    <p>Component-Based Software Engineering • Java EE Edition</p>
                </div>
            </div>
            <span class="header-badge">JSF / EJB / JPA / JAX-RS</span>
        </header>

        <!-- Grid Container -->
        <div class="app-grid">
            
            <!-- Left Panel: Add Book Form -->
            <aside class="glass-card">
                <div class="card-title-group">
                    <h2><i class="pi pi-plus-circle"></i>Add Book Asset</h2>
                    <p>Register a new book in the secure database catalog.</p>
                </div>

                <h:form id="form-add">
                    <!-- Standard Notifications -->
                    <p:growl id="growl" showDetail="true" life="4000" />

                    <div class="form-field">
                        <label for="title">Book Title</label>
                        <p:inputText id="title" value="#{bookController.newBook.title}" 
                                     required="true" requiredMessage="Title is required!"
                                     placeholder="e.g. Effective Java" />
                    </div>

                    <div class="form-field">
                        <label for="author">Author Full Name</label>
                        <p:inputText id="author" value="#{bookController.newBook.author}" 
                                     required="true" requiredMessage="Author is required!"
                                     placeholder="e.g. Joshua Bloch" />
                    </div>

                    <div class="form-field">
                        <label for="isbn">ISBN Identifier</label>
                        <p:inputText id="isbn" value="#{bookController.newBook.isbn}" 
                                     required="true" requiredMessage="ISBN is required!"
                                     placeholder="e.g. 9780134685991" />
                    </div>

                    <p:commandButton value="Save to Catalog" 
                                     action="#{bookController.saveBook}" 
                                     update="growl form-add form-list:booksTable" 
                                     icon="pi pi-save"
                                     style="width: 100%; margin-top: 10px;" />
                </h:form>
            </aside>

            <!-- Right Panel: Catalog List and Search -->
            <main class="glass-card">
                <div class="card-title-group">
                    <h2><i class="pi pi-database"></i>Active Book Inventory</h2>
                    <p>Search, filter, and permanently manage library assets.</p>
                </div>

                <h:form id="form-list">
                    <!-- Search Wrapper -->
                    <div class="search-wrapper">
                        <div class="search-input">
                            <p:inputText id="search" value="#{bookController.searchQuery}" 
                                         placeholder="Filter catalog by book title..." />
                        </div>
                        <p:commandButton value="Search" 
                                         action="#{bookController.search}" 
                                         update="booksTable" 
                                         icon="pi pi-search" 
                                         class="btn-cyan" />
                        <p:commandButton value="Clear" 
                                         action="#{bookController.clearSearch}" 
                                         update="search booksTable" 
                                         icon="pi pi-refresh" 
                                         class="btn-secondary" />
                    </div>

                    <!-- Books Inventory Table -->
                    <p:dataTable id="booksTable" value="#{bookController.books}" var="book"
                                 emptyMessage="No book assets found matching the query."
                                 paginator="true" rows="6" paginatorPosition="bottom">
                        
                        <p:column headerText="Database ID" style="width: 110px; text-align: center;">
                            <h:outputText value="#{book.id}" style="color: var(--text-secondary); font-family: monospace; font-size: 0.95rem;" />
                        </p:column>

                        <p:column headerText="Title" sortBy="#{book.title}">
                            <h:outputText value="#{book.title}" style="font-weight: 500; color: #ffffff;" />
                        </p:column>

                        <p:column headerText="Author" sortBy="#{book.author}">
                            <h:outputText value="#{book.author}" />
                        </p:column>

                        <p:column headerText="ISBN-13" style="width: 180px; text-align: center;">
                            <h:outputText value="#{book.isbn}" style="font-family: monospace; font-size: 0.95rem; color: #a5b4fc;" />
                        </p:column>

                        <p:column headerText="Actions" style="width: 110px; text-align: center;">
                            <p:commandButton value="Delete" 
                                             action="#{bookController.deleteBook(book.id)}" 
                                             update="booksTable form-add:growl" 
                                             icon="pi pi-trash" 
                                             class="btn-action-delete">
                                <p:confirm header="Confirmation" message="Are you sure you want to delete this book?" icon="pi pi-exclamation-triangle" />
                            </p:commandButton>
                        </p:column>
                    </p:dataTable>

                    <!-- Deletion Dialog confirmation -->
                    <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
                        <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-flat btn-secondary" />
                        <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes btn-action-delete" />
                    </p:confirmDialog>
                </h:form>
            </main>

        </div>
    </div>
</h:body>
</html>
